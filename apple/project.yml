name: Clara
options:
  bundleIdPrefix: com.brightpuddle.clara
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Clara-macOS:
    type: application
    platform: macOS
    sources:
      - path: Clara
        excludes:
          - "iOS/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brightpuddle.clara.macos
        INFOPLIST_FILE: Clara/Resources/Info-macOS.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: Clara/Resources/Clara-macOS.entitlements

  Clara-iOS:
    type: application
    platform: iOS
    sources:
      - path: Clara
        excludes:
          - "macOS/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brightpuddle.clara.ios
        INFOPLIST_FILE: Clara/Resources/Info-iOS.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: Clara/Resources/Clara-iOS.entitlements
