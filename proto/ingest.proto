syntax = "proto3";

package clara.v1;

option go_package = "github.com/brightpuddle/clara/pb";

// IngestService is called by the agent to push note content to the server
// and to poll for approved actions to execute locally.
service IngestService {
  // IngestNote sends a single note's full content for processing.
  rpc IngestNote(IngestRequest) returns (IngestResponse);

  // GetPendingActions returns actions approved by the user that the agent
  // should execute (e.g. add a [[wikilink]] to a local file).
  rpc GetPendingActions(GetActionsRequest) returns (GetActionsResponse);

  // AckAction marks an action as applied (or failed) after the agent
  // has executed it.
  rpc AckAction(AckRequest) returns (AckResponse);
}

message IngestRequest {
  // Stable document ID — we use the absolute file path.
  string document_id = 1;
  string path        = 2;
  string title       = 3;
  string content     = 4;
  int64  modified_at = 5; // unix timestamp
}

message IngestResponse {
  string document_id = 1;
  bool   success     = 2;
  string error       = 3;
}

message GetActionsRequest {
  // agent_id identifies which agent is polling (allows multi-machine in future)
  string agent_id = 1;
}

message GetActionsResponse {
  repeated Action actions = 1;
}

message Action {
  string     action_id     = 1;
  ActionType type          = 2;
  string     document_path = 3; // absolute path to the file to modify
  string     link_target   = 4; // the [[wikilink]] text to insert
  string     context       = 5; // human-readable reason for the suggestion
}

enum ActionType {
  ACTION_UNKNOWN      = 0;
  ACTION_ADD_BACKLINK = 1;
}

message AckRequest {
  string action_id = 1;
  bool   success   = 2;
  string error     = 3; // populated if success=false
}

message AckResponse {
  bool success = 1;
}
