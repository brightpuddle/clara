syntax = "proto3";

package clara.bridge.v1;

option go_package = "github.com/brightpuddle/clara/internal/bridge/gen;bridgepb";

// BridgeService provides access to native macOS capabilities (EventKit,
// CoreSpotlight, FileSystem events) from the Go Clara daemon.
service BridgeService {
  // CallTool invokes a named native tool and returns a JSON-encoded result.
  rpc CallTool(CallToolRequest) returns (CallToolResponse);
  // Ping checks whether the Swift bridge process is alive and responsive.
  rpc Ping(PingRequest) returns (PingResponse);
}

message CallToolRequest {
  // name identifies the native tool (e.g. "fetch_reminders").
  string name = 1;
  // args_json is a JSON-encoded map of tool arguments.
  string args_json = 2;
}

message CallToolResponse {
  // result_json is the JSON-encoded tool result on success.
  string result_json = 1;
  // error is non-empty when the tool invocation failed.
  string error = 2;
}

message PingRequest {}

message PingResponse {
  string version = 1;
}
