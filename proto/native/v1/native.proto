syntax = "proto3";

package native.v1;

option go_package = "github.com/brightpuddle/clara/gen/native/v1;nativev1";

import "artifact/v1/artifact.proto";
import "google/protobuf/timestamp.proto";

// NativeWorkerService is served by the Swift native worker over a Unix socket.
// The Go agent calls these RPCs to access macOS-native APIs.
service NativeWorkerService {
  // ListReminders returns all incomplete reminders across all lists.
  rpc ListReminders(ListRemindersRequest) returns (ListRemindersResponse);

  // MarkReminderDone marks a reminder as completed in EventKit.
  rpc MarkReminderDone(MarkReminderDoneRequest) returns (MarkReminderDoneResponse);

  // SpotlightSearch searches the Spotlight index via NSMetadataQuery.
  rpc SpotlightSearch(SpotlightSearchRequest) returns (SpotlightSearchResponse);

  // GetSystemTheme returns the current macOS appearance (dark or light).
  rpc GetSystemTheme(GetSystemThemeRequest) returns (GetSystemThemeResponse);
}

message ListRemindersRequest {
  bool include_completed = 1; // default false
}

message Reminder {
  string   id          = 1;
  string   title       = 2;
  string   notes       = 3;
  string   list_name   = 4;
  bool     completed   = 5;
  google.protobuf.Timestamp due_date    = 6;
  google.protobuf.Timestamp created_at  = 7;
  google.protobuf.Timestamp modified_at = 8;
  int32    priority    = 9; // 0=none, 1=high, 5=medium, 9=low (EventKit scale)
}

message ListRemindersResponse {
  repeated Reminder reminders = 1;
}

message MarkReminderDoneRequest {
  string id = 1;
}

message MarkReminderDoneResponse {
  bool ok    = 1;
  string error = 2;
}

message SpotlightSearchRequest {
  string query      = 1;
  int32  max_results = 2; // default 20
  repeated string scopes = 3; // directory paths to scope search; empty = all
}

message SpotlightResult {
  string path         = 1;
  string display_name = 2;
  string content_type = 3;
  google.protobuf.Timestamp last_used = 4;
}

message SpotlightSearchResponse {
  repeated SpotlightResult results = 1;
}

message GetSystemThemeRequest {}

message GetSystemThemeResponse {
  bool dark = 1; // true = dark mode, false = light mode
}

