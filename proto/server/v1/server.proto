syntax = "proto3";

package server.v1;

option go_package = "github.com/brightpuddle/clara/gen/server/v1;serverv1";

import "artifact/v1/artifact.proto";

// ServerService is the gRPC interface from the Agent to the Clara Server.
// The server handles AI-powered embedding storage and similarity search.
service ServerService {
  // StoreArtifact persists an artifact and its embedding vector.
  rpc StoreArtifact(StoreArtifactRequest) returns (StoreArtifactResponse);

  // SearchSimilar performs kNN vector similarity search given an embedding.
  rpc SearchSimilar(SearchSimilarRequest) returns (SearchSimilarResponse);

  // GetRelated returns top-k artifacts most similar to the given artifact ID.
  rpc GetRelated(GetRelatedRequest) returns (GetRelatedResponse);
}

message StoreArtifactRequest {
  artifact.v1.Artifact artifact  = 1;
  repeated float       embedding = 2; // nomic-embed-text produces 768-dim vectors
}

message StoreArtifactResponse {
  bool   ok    = 1;
  string error = 2;
}

message SearchSimilarRequest {
  repeated float embedding = 1;
  int32          k         = 2; // number of neighbors to return; default 10
  repeated artifact.v1.ArtifactKind kinds = 3; // filter by kind; empty = all
}

message SearchSimilarResponse {
  repeated SimilarResult results = 1;
}

message SimilarResult {
  artifact.v1.Artifact artifact  = 1;
  double               distance  = 2;
}

message GetRelatedRequest {
  string artifact_id = 1;
  int32  k           = 2; // default 10
}

message GetRelatedResponse {
  repeated SimilarResult results = 1;
}
